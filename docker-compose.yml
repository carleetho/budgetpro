version: '3.8'

services:
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: budgetpro-db
    ports:
      - "5432:5432"
    env_file:
      - database.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache (Optional, used by resilience4j/caffeine fallback)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: budgetpro-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
